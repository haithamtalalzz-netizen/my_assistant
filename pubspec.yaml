name: my_assistant
description: "My Assistant — مدير شخصي: صحة، مواعيد، فلوس، مستندات، عادات."
publish_to: 'none'

version: 0.9.0+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any
  sqflite: ^2.4.0
  # نسخة الويب من sqflite (IndexedDB + sqlite3.wasm) — عشان التطبيق يشتغل في المتصفح.
  sqflite_common_ffi_web: ^0.4.3
  # مثبّت على 2.4.6 عشان يطابق ملف sqlite3.wasm اللي بيجيبه setup الويب —
  # النسخ 3.x بتكسّر WebAssembly.instantiate (Import "env" mismatch) → شاشة بيضا.
  # (الموبايل بيستخدم SQLite الأصلي مش الحزمة دي، فمش متأثر.)
  sqlite3: 2.4.6
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  adhan_dart: ^1.1.2
  archive: ^4.0.0
  share_plus: ^10.0.0
  file_picker: ^11.0.2
  home_widget: ^0.7.0
  health: ^13.0.0
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.0
  pdf: ^3.11.0
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.0
  quick_actions: ^1.0.7
  receive_sharing_intent: ^1.8.1
  fl_chart: ^0.69.0
  hijri: ^3.0.0
  flutter_contacts: ^1.1.9
  geolocator: ^13.0.1
  add_2_calendar: ^3.0.1
  # بوصلة القبلة — يقرأ مستشعر البوصلة (الموبايل فقط، محمي بـ kIsWeb).
  flutter_compass: ^0.8.0
  # قائمة بمواضع معروفة — للقفز لآية معيّنة وحفظ آخر موضع فى المصحف (Dart خالص).
  scrollable_positioned_list: ^0.3.8
  # تشغيل تلاوة القرآن (بث من everyayah — قرّاء معتمدون).
  audioplayers: ^6.1.0
  # عرض صفحات المصحف كصور (بث + تخزين تلقائى على القرص).
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.0
  # التقاط بطاقة الآية كصورة للمشاركة.
  screenshot: ^3.0.0
  # ترتيب الكروت بالسحب (ضغطة طويلة).
  reorderable_grid_view: ^2.2.8
  # مسح باركود الأطعمة (الكاميرا) → بحث Open Food Facts. موبايل فقط (kIsWeb محمي).
  mobile_scanner: ^5.2.3
  # قراءة ردود «اسأل مديرك» صوتيًا (TTS مدمج فى الجهاز — مجانى).
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.3
  flutter_launcher_icons: ^0.14.1
  image: ^4.2.0

# أيقونة التطبيق — تُولَّد من الصورة عبر: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/quran/
    - assets/food/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
