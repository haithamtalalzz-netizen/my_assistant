name: my_assistant
description: "My Assistant — مدير شخصي: صحة، مواعيد، فلوس، مستندات، عادات."
publish_to: 'none'

version: 0.9.0+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any
  sqflite: ^2.4.0
  # نسخة الويب من sqflite (IndexedDB + sqlite3.wasm) — عشان التطبيق يشتغل في المتصفح.
  sqflite_common_ffi_web: ^0.4.3
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  adhan_dart: ^1.1.2
  archive: ^4.0.0
  share_plus: ^10.0.0
  file_picker: ^11.0.2
  home_widget: ^0.7.0
  health: ^13.0.0
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.0
  pdf: ^3.11.0
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.0
  quick_actions: ^1.0.7
  receive_sharing_intent: ^1.8.1
  fl_chart: ^0.69.0
  hijri: ^3.0.0
  flutter_contacts: ^1.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
