name: Deploy web to Firebase Hosting

# بيبني نسخة الويب من التطبيق على سيرفرات GitHub وينشر build/web على
# Firebase Hosting أوتوماتيك مع كل push على master. نفس أسلوب تطبيق طارة.
# بيحتاج سرّ واحد في إعدادات الريبو: FIREBASE_SERVICE_ACCOUNT (JSON مفتاح
# حساب الخدمة من Firebase)، ومشروع Firebase محدّد في .firebaserc.

on:
  push:
    branches: [master]
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "assets/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release, no service worker)
        # --pwa-strategy=none: من غير service worker → المتصفح يجيب أحدث نشر
        # على طول (مع هيدرز الـ no-cache)، فمفيش مشكلة "الويب مش بيتحدّث".
        run: flutter build web --release --pwa-strategy=none

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # النشر بنسخة مثبّتة من firebase-tools باستخدام حساب الخدمة
      # (GOOGLE_APPLICATION_CREDENTIALS) — أثبت من firebase-action اللي بيرقّي
      # نفسه لنسخة مابتقبلش المفتاح.
      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx -y firebase-tools@13.29.1 deploy --only hosting --non-interactive
