<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="مساعدي — مدير شخصي: صحة، مواعيد، فلوس، مستندات، عادات.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="مساعدي">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>مساعدي</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- شاشة تحميل + عارض أخطاء مرئي — عشان الشاشة ماتبقاش بيضا صامتة لو حصل
       أي مشكلة في التشغيل؛ بيختفي تلقائيًا لما التطبيق يرسم أول إطار. -->
  <div id="boot"
       style="position:fixed;inset:0;display:flex;flex-direction:column;
              align-items:center;justify-content:center;gap:14px;
              background:#0B0F17;color:#8aa0c0;font-family:sans-serif;
              text-align:center;padding:24px">
    <div style="width:40px;height:40px;border:4px solid #223;border-top-color:#2FDE9B;
                border-radius:50%;animation:sp 1s linear infinite"></div>
    <div>جاري تحميل «مساعدي»…<br><small style="color:#5a6b85">أول فتح بياخد لحظات</small></div>
  </div>
  <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
  <pre id="booterr"
       style="display:none;position:fixed;inset:0;margin:0;overflow:auto;
              background:#2a0f12;color:#ffb4b4;font:12px/1.5 monospace;
              padding:16px;white-space:pre-wrap;z-index:99999;direction:ltr"></pre>
  <script>
    (function () {
      var errBox = document.getElementById('booterr');
      function show(msg) {
        errBox.style.display = 'block';
        errBox.textContent += msg + '\n\n';
      }
      window.addEventListener('error', function (e) {
        show('❌ error: ' + (e.message || e) +
             (e.filename ? '\n@ ' + e.filename + ':' + e.lineno : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('❌ promise: ' + (r && (r.message || r.toString()) || r));
      });
      // نشيل شاشة التحميل أول ما نلاقي canvas اترسم (نفتش جوّه shadow DOM كمان).
      function anyCanvas(root) {
        var els = root.querySelectorAll('*');
        for (var i = 0; i < els.length; i++) {
          if (els[i].tagName === 'CANVAS') return true;
          if (els[i].shadowRoot && anyCanvas(els[i].shadowRoot)) return true;
        }
        return false;
      }
      var tries = 0;
      var poll = setInterval(function () {
        tries++;
        if (anyCanvas(document)) {
          var boot = document.getElementById('boot');
          if (boot) boot.remove();
          clearInterval(poll);
        } else if (tries >= 40) { // 40 × 0.5s = 20 ثانية
          clearInterval(poll);
          show('⏳ التطبيق مرسمش أول إطار خلال 20 ثانية — غالبًا محرّك الرسم (CanvasKit) مش بيبدأ على المتصفح ده.');
        }
      }, 500);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
